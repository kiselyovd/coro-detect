name: lint
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.13
      - run: uv sync --all-groups
      - run: uv run --all-groups ruff check .
      - run: uv run --all-groups ruff format --check .
      - run: uv run --all-groups mypy src scripts
      - run: uv run --all-groups deptry .
      - run: uv run --all-groups bandit -r src -c pyproject.toml
      - run: uv run --all-groups interrogate src --fail-under 30
      - uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
      - run: uv run --all-groups codespell

name: test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Sync deps
        run: uv sync --all-groups --python ${{ matrix.python-version }}
      - name: Run pytest
        run: uv run --all-groups --python ${{ matrix.python-version }} pytest --cov=cardio_risk_rf --cov-report=xml --cov-fail-under=10
      - name: Upload coverage artifact
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 1

  coverage-badge:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: coverage-xml
      - name: Generate shields endpoint JSON
        run: |
          python - <<'PY'
          import json, xml.etree.ElementTree as ET
          rate = float(ET.parse("coverage.xml").getroot().get("line-rate"))
          pct = round(rate * 100)
          if pct >= 90:
              color = "brightgreen"
          elif pct >= 75:
              color = "green"
          elif pct >= 60:
              color = "yellowgreen"
          elif pct >= 40:
              color = "yellow"
          elif pct >= 20:
              color = "orange"
          else:
              color = "red"
          with open("coverage.json", "w") as f:
              json.dump(
                  {"schemaVersion": 1, "label": "coverage", "message": f"{pct}%", "color": color},
                  f,
              )
          PY
      - name: Publish to badges branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir /tmp/badges
          cd /tmp/badges
          git init -q -b badges
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin badges
          git reset --hard origin/badges
          cp "$GITHUB_WORKSPACE/coverage.json" coverage.json
          git add coverage.json
          if git diff --cached --quiet; then
            echo "No badge changes"
            exit 0
          fi
          git commit -m "chore(badge): update coverage [skip ci]"
          git push origin badges

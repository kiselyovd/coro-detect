# LightGBM main-model defaults; Optuna sweep overrides these in train.py.
_target_: cardio_risk_rf.models.factory.build_main
scale_pos_weight: 5.67   # computed as N_neg/N_pos on train split, recomputed at train-time
random_state: 42
n_estimators: 500
learning_rate: 0.05
num_leaves: 31
min_child_samples: 20
subsample: 0.85
colsample_bytree: 0.85
reg_alpha: 0.0
reg_lambda: 0.0
